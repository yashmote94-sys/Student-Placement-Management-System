<!DOCTYPE html>
<html>

<head>
    <title>Edit Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f1f5f9;
        }

        .form-card{
            background:white;
            padding:30px;
            border-radius:20px;
            box-shadow:0px 5px 15px rgba(0,0,0,0.1);
        }
    </style>

</head>

<body>

<div class="container mt-5">

    <div class="form-card">

        <h2 class="mb-4">
            ✏️ Edit Student
        </h2>

        <a href="/" class="btn btn-secondary mb-3">
            ← Dashboard
        </a>

        <a href="/students" class="btn btn-primary mb-3">
            View Students
        </a>

        <form method="post">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label>Name</label>

                    <input
                        type="text"
                        name="name"
                        value="{{ student.name }}"
                        class="form-control"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Email</label>

                    <input
                        type="email"
                        name="email"
                        value="{{ student.email }}"
                        class="form-control"
                        required>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Role</label>

                    <select
                        name="role"
                        class="form-control">

                        <option value="student">Student</option>
                        <option value="trainer">Trainer</option>
                        <option value="admin">Admin</option>

                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Branch</label>

                    <input
                        type="text"
                        name="branch"
                        value="{{ student.branch }}"
                        class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>CGPA</label>

                    <input
                        type="text"
                        name="cgpa"
                        value="{{ student.cgpa }}"
                        class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Internship</label>

                    <select
                        name="internship"
                        class="form-control">

                        <option value="Yes">Yes</option>
                        <option value="No">No</option>

                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>PPO</label>

                    <select
                        name="ppo"
                        class="form-control">

                        <option value="Yes">Yes</option>
                        <option value="No">No</option>

                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Placement Status</label>

                    <select
                        name="placement_status"
                        class="form-control">

                        <option value="Placed">Placed</option>
                        <option value="Not Placed">Not Placed</option>

                    </select>
                </div>

                <div class="col-md-6 mb-3">
                    <label>Company Name</label>

                    <input
                        type="text"
                        name="company_name"
                        value="{{ student.company_name }}"
                        class="form-control">
                </div>

                <div class="col-md-6 mb-3">
                    <label>Package (LPA)</label>

                    <input
                        type="text"
                        name="package"
                        value="{{ student.package }}"
                        class="form-control">
                </div>

            </div>

            <button class="btn btn-warning btn-lg">
                Update Student
            </button>

            <a href="/students" class="btn btn-secondary btn-lg">
                Cancel
            </a>

        </form>

    </div>

</div>

</body>
</html>
