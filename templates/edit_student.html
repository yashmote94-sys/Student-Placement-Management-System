<!DOCTYPE html>
<html>

<head>

    <title>Edit Record</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between">

        <h2>✏️ Edit Record</h2>

        <a href="/" class="btn btn-secondary">
            Dashboard
        </a>

    </div>

    <hr>

    <form method="post">

        <!-- Common Fields -->

        <div class="mb-3">
            <label>Name</label>

            <input
                type="text"
                name="name"
                value="{{ student.name }}"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Email</label>

            <input
                type="email"
                name="email"
                value="{{ student.email }}"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Role</label>

            <select
                name="role"
                id="role"
                class="form-control"
                onchange="toggleFields()"
                required>

                <option value="Student"
                {% if student.role == "Student" %}selected{% endif %}>
                Student
                </option>

                <option value="Trainer"
                {% if student.role == "Trainer" %}selected{% endif %}>
                Trainer
                </option>

                <option value="Admin"
                {% if student.role == "Admin" %}selected{% endif %}>
                Admin
                </option>

            </select>

        </div>

        <!-- STUDENT SECTION -->

        <div id="studentFields">

            <h4 class="text-primary mt-4">
                🎓 Student Details
            </h4>

            <div class="mb-3">
                <label>Branch</label>
                <input
                    type="text"
                    name="branch"
                    value="{{ student.branch }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>CGPA</label>
                <input
                    type="text"
                    name="cgpa"
                    value="{{ student.cgpa }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Internship</label>

                <select
                    name="internship"
                    class="form-control">

                    <option value="Yes"
                    {% if student.internship == "Yes" %}selected{% endif %}>
                    Yes
                    </option>

                    <option value="No"
                    {% if student.internship == "No" %}selected{% endif %}>
                    No
                    </option>

                </select>

            </div>

            <div class="mb-3">
                <label>PPO</label>

                <select
                    name="ppo"
                    class="form-control">

                    <option value="Yes"
                    {% if student.ppo == "Yes" %}selected{% endif %}>
                    Yes
                    </option>

                    <option value="No"
                    {% if student.ppo == "No" %}selected{% endif %}>
                    No
                    </option>

                </select>

            </div>

            <div class="mb-3">
                <label>Placement Status</label>

                <select
                    name="placement_status"
                    class="form-control">

                    <option value="Placed"
                    {% if student.placement_status == "Placed" %}selected{% endif %}>
                    Placed
                    </option>

                    <option value="Not Placed"
                    {% if student.placement_status == "Not Placed" %}selected{% endif %}>
                    Not Placed
                    </option>

                </select>

            </div>

            <div class="mb-3">
                <label>Company Name</label>
                <input
                    type="text"
                    name="company_name"
                    value="{{ student.company_name }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Package</label>
                <input
                    type="text"
                    name="package"
                    value="{{ student.package }}"
                    class="form-control">
            </div>

        </div>

        <!-- TRAINER SECTION -->

        <div id="trainerFields">

            <h4 class="text-success mt-4">
                👨‍🏫 Trainer Details
            </h4>

            <div class="mb-3">
                <label>Department</label>
                <input
                    type="text"
                    name="department"
                    value="{{ student.department }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Subject</label>
                <input
                    type="text"
                    name="subject"
                    value="{{ student.subject }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Experience</label>
                <input
                    type="text"
                    name="experience"
                    value="{{ student.experience }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Batch Assigned</label>
                <input
                    type="text"
                    name="batch_assigned"
                    value="{{ student.batch_assigned }}"
                    class="form-control">
            </div>

        </div>

        <!-- ADMIN SECTION -->

        <div id="adminFields">

            <h4 class="text-danger mt-4">
                🛡 Admin Details
            </h4>

            <div class="mb-3">
                <label>Employee ID</label>
                <input
                    type="text"
                    name="employee_id"
                    value="{{ student.employee_id }}"
                    class="form-control">
            </div>

            <div class="mb-3">
                <label>Designation</label>
                <input
                    type="text"
                    name="designation"
                    value="{{ student.designation }}"
                    class="form-control">
            </div>

        </div>

        <button class="btn btn-primary">
            Update Record
        </button>

        <a href="/" class="btn btn-secondary">
            Cancel
        </a>

    </form>

</div>

<script>

function toggleFields(){

    let role =
        document.getElementById("role").value;

    document.getElementById("studentFields").style.display = "none";
    document.getElementById("trainerFields").style.display = "none";
    document.getElementById("adminFields").style.display = "none";

    if(role === "Student"){
        document.getElementById("studentFields").style.display = "block";
    }

    if(role === "Trainer"){
        document.getElementById("trainerFields").style.display = "block";
    }

    if(role === "Admin"){
        document.getElementById("adminFields").style.display = "block";
    }
}

toggleFields();

</script>

</body>
</html>
