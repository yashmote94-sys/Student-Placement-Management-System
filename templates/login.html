<!DOCTYPE html>
<html>

<head>

    <title>Login - Student Placement Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background: linear-gradient(135deg,#0f172a,#1e293b);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{
            width:450px;
            background:white;
            border-radius:20px;
            padding:40px;
            box-shadow:0 10px 25px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            margin-bottom:25px;
        }

        .title h2{
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="login-card">

    <div class="title">

        <h2>🎓 Student Placement Portal</h2>

        <p class="text-muted">
            Login to Continue
        </p>

    </div>

    {% if error %}

    <div class="alert alert-danger">
        {{ error }}
    </div>

    {% endif %}

    <form method="post">

        <div class="mb-3">

            <label>Username</label>

            <input
                type="text"
                name="username"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label>Password</label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>

        </div>

        <button
            type="submit"
            class="btn btn-primary w-100">

            Login

        </button>

    </form>

    <hr>

    <h6>Demo Credentials</h6>

    <p>
        <b>Admin:</b> admin / admin123
    </p>

    <p>
        <b>Trainer:</b> trainer / trainer123
    </p>

    <p>
        <b>Student:</b> student / student123
    </p>

</div>

</body>
</html>
