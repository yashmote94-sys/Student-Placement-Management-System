<!DOCTYPE html>
<html>

<head>

    <title>Add Record</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-4">

    <div class="d-flex justify-content-between">

        <h2>➕ Add New Record</h2>

        <a href="/" class="btn btn-secondary">
            Dashboard
        </a>

    </div>

    <hr>

    <form method="post">

        <!-- Common Fields -->

        <div class="mb-3">
            <label>Name</label>

            <input
                type="text"
                name="name"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Email</label>

            <input
                type="email"
                name="email"
                class="form-control"
                required>
        </div>

        <div class="mb-3">
            <label>Role</label>

            <select
                name="role"
                id="role"
                class="form-control"
                onchange="toggleFields()"
                required>

                <option value="">Select Role</option>

                <option value="Student">Student</option>
                <option value="Trainer">Trainer</option>
                <option value="Admin">Admin</option>

            </select>

        </div>

        <!-- STUDENT SECTION -->

        <div id="studentFields" style="display:none;">

            <h4 class="mt-4 text-primary">
                🎓 Student Details
            </h4>

            <div class="mb-3">
                <label>Branch</label>
                <input type="text" name="branch" class="form-control">
            </div>

            <div class="mb-3">
                <label>CGPA</label>
                <input type="text" name="cgpa" class="form-control">
            </div>

            <div class="mb-3">
                <label>Internship</label>

                <select name="internship" class="form-control">
                    <option value="">Select</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>

            </div>

            <div class="mb-3">
                <label>PPO</label>

                <select name="ppo" class="form-control">
                    <option value="">Select</option>
                    <option value="Yes">Yes</option>
                    <option value="No">No</option>
                </select>

            </div>

            <div class="mb-3">
                <label>Placement Status</label>

                <select
                    name="placement_status"
                    class="form-control">

                    <option value="">Select</option>
                    <option value="Placed">Placed</option>
                    <option value="Not Placed">Not Placed</option>

                </select>

            </div>

            <div class="mb-3">
                <label>Company Name</label>
                <input type="text" name="company_name" class="form-control">
            </div>

            <div class="mb-3">
                <label>Package (LPA)</label>
                <input type="text" name="package" class="form-control">
            </div>

        </div>

        <!-- TRAINER SECTION -->

        <div id="trainerFields" style="display:none;">

            <h4 class="mt-4 text-success">
                👨‍🏫 Trainer Details
            </h4>

            <div class="mb-3">
                <label>Department</label>
                <input type="text" name="department" class="form-control">
            </div>

            <div class="mb-3">
                <label>Subject</label>
                <input type="text" name="subject" class="form-control">
            </div>

            <div class="mb-3">
                <label>Experience</label>
                <input type="text" name="experience" class="form-control">
            </div>

            <div class="mb-3">
                <label>Batch Assigned</label>
                <input type="text" name="batch_assigned" class="form-control">
            </div>

        </div>

        <!-- ADMIN SECTION -->

        <div id="adminFields" style="display:none;">

            <h4 class="mt-4 text-danger">
                🛡 Admin Details
            </h4>

            <div class="mb-3">
                <label>Employee ID</label>
                <input type="text" name="employee_id" class="form-control">
            </div>

            <div class="mb-3">
                <label>Designation</label>
                <input type="text" name="designation" class="form-control">
            </div>

        </div>

        <button class="btn btn-primary mt-3">
            Save Record
        </button>

    </form>

</div>

<script>

function toggleFields(){

    let role =
        document.getElementById("role").value;

    document.getElementById("studentFields").style.display = "none";
    document.getElementById("trainerFields").style.display = "none";
    document.getElementById("adminFields").style.display = "none";

    if(role === "Student"){
        document.getElementById("studentFields").style.display = "block";
    }

    if(role === "Trainer"){
        document.getElementById("trainerFields").style.display = "block";
    }

    if(role === "Admin"){
        document.getElementById("adminFields").style.display = "block";
    }
}

</script>

</body>
</html>
